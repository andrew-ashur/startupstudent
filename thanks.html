<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're on the list! | The Startup Student</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .thanks {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .thanks .section-title {
            margin-bottom: 1rem;
        }
        .thanks p {
            color: var(--color-text-muted);
            font-size: 1.15rem;
            max-width: 480px;
            margin-bottom: 2rem;
        }
        .thanks .btn {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="thanks">
        <div class="hero-badge" style="opacity:1;transform:none;animation:none;margin-bottom:1.5rem;">You're In</div>
        <h1 class="section-title">Thanks for signing up.</h1>
        <p>We'll email you the moment The Startup Student is available. In the meantime, follow along for updates.</p>
        <a href="https://www.andrewashur.com" class="btn btn-primary">Visit andrewashur.com</a>
    </div>
</body>
</html>
